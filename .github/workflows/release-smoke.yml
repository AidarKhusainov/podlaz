name: Release Smoke

on:
  push:
    branches:
      - release-smoke-branch
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Build release artifacts without publishing
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      VERSION: 0.1.999
      DEB_RELEASE: 1
      DEB_FILE_VERSION: 0.1.999-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Go fmt check
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Govulncheck
        run: |
          . packaging/package-toolchain.env
          go install golang.org/x/vuln/cmd/govulncheck@"${GOVULNCHECK_VERSION}"
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Install package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends file lintian man-db
          . packaging/package-toolchain.env
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@"${NFPM_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Linux binary tarball
        run: |
          set -euo pipefail
          mkdir -p dist/release/bin
          version_package="github.com/AidarKhusainov/tunwarden/internal/app/cli.version"
          ldflags="-s -w -X ${version_package}=${VERSION}"
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$ldflags" -o dist/release/bin/tunwarden ./cmd/tunwarden
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$ldflags" -o dist/release/bin/tunwardend ./cmd/tunwardend
          cd dist/release/bin
          tar -czf "../tunwarden_${VERSION}_linux_amd64.tar.gz" tunwarden tunwardend
          cd ../../..
          ./dist/release/bin/tunwarden version
          test "$(./dist/release/bin/tunwarden version)" = "tunwarden ${VERSION}"

      - name: Build Debian package
        env:
          TUNWARDEN_VERSION: ${{ env.VERSION }}
          TUNWARDEN_DEB_VERSION: ${{ env.VERSION }}
          TUNWARDEN_DEB_RELEASE: ${{ env.DEB_RELEASE }}
          TUNWARDEN_DEB_ARCH: amd64
        run: bash scripts/build-deb.sh

      - name: Inspect package metadata
        run: dpkg-deb --info "dist/tunwarden_${DEB_FILE_VERSION}_amd64.deb"

      - name: Inspect package contents
        run: |
          dpkg-deb --contents "dist/tunwarden_${DEB_FILE_VERSION}_amd64.deb" | tee /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./usr/local(/|$)' /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./run(/|$)' /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./var/run(/|$)' /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./home(/|$)' /tmp/tunwarden-package-contents.txt
          grep -F './usr/bin/tunwarden' /tmp/tunwarden-package-contents.txt
          grep -F './usr/bin/tunwardend' /tmp/tunwarden-package-contents.txt
          grep -F './usr/share/man/man1/tunwarden.1.gz' /tmp/tunwarden-package-contents.txt
          grep -F './usr/share/man/man8/tunwardend.8.gz' /tmp/tunwarden-package-contents.txt

      - name: Lint Debian package
        run: |
          set -o pipefail
          lintian --fail-on error "dist/tunwarden_${DEB_FILE_VERSION}_amd64.deb" 2>&1 | tee /tmp/tunwarden-lintian.txt

      - name: Install package locally
        run: |
          set -euo pipefail
          ip route show > /tmp/tunwarden-routes-before.txt
          sudo apt install -y "./dist/tunwarden_${DEB_FILE_VERSION}_amd64.deb"
          ip route show > /tmp/tunwarden-routes-after.txt
          diff -u /tmp/tunwarden-routes-before.txt /tmp/tunwarden-routes-after.txt
          dpkg -L tunwarden
          test "$(tunwarden version)" = "tunwarden ${VERSION}"
          test -x /usr/bin/tunwarden
          test -x /usr/bin/tunwardend
          test -f /usr/share/man/man1/tunwarden.1.gz
          test -f /usr/share/man/man8/tunwardend.8.gz
          man -l /usr/share/man/man1/tunwarden.1.gz >/dev/null
          man -l /usr/share/man/man8/tunwardend.8.gz >/dev/null
          ! pgrep -x tunwardend

      - name: Create checksums
        run: |
          set -euo pipefail
          mkdir -p dist/release
          cp "dist/tunwarden_${DEB_FILE_VERSION}_amd64.deb" dist/release/
          cd dist/release
          sha256sum "tunwarden_${VERSION}_linux_amd64.tar.gz" "tunwarden_${DEB_FILE_VERSION}_amd64.deb" > "tunwarden_${VERSION}_checksums.txt"
          cat "tunwarden_${VERSION}_checksums.txt"

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tunwarden-release-smoke-${{ env.VERSION }}
          path: |
            dist/release/tunwarden_${{ env.VERSION }}_linux_amd64.tar.gz
            dist/release/tunwarden_${{ env.DEB_FILE_VERSION }}_amd64.deb
            dist/release/tunwarden_${{ env.VERSION }}_checksums.txt
            /tmp/tunwarden-lintian.txt
          if-no-files-found: error
